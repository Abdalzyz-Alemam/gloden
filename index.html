<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>كافيه قولدن - Golden Cafe</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --golden: #D4AF37;
        --golden-dark: #B8860B;
        --black-gold: #1A1A1A;
        --cream: #FDFCF0;
      }
      body {
        font-family: 'Cairo', sans-serif;
        background-color: var(--cream);
      }
      .bg-golden { background-color: var(--golden); }
      .text-golden { color: var(--golden); }
      .border-golden { border-color: var(--golden); }
      
      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      @keyframes welcome-zoom {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-welcome {
        animation: welcome-zoom 1s ease-out forwards;
      }
    </style>
  </head>
  <body class="min-h-screen text-gray-900 overflow-x-hidden">
    <!-- صفحة ترحيبية جذابة (Welcome Screen) -->
    <div id="welcome-screen" class="fixed inset-0 z-[200] bg-black-gold flex flex-col items-center justify-center p-6 text-center transition-all duration-700">
      <!-- تأثيرات الخلفية -->
      <div class="absolute inset-0 opacity-30">
        <img id="welcome-bg" src="" class="w-full h-full object-cover">
      </div>
      <div class="absolute inset-0 bg-gradient-to-tr from-black-gold via-black-gold/95 to-black-gold/60"></div>
      
      <!-- عناصر ضوئية زخرفية -->
      <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-golden/10 rounded-full blur-[120px] pointer-events-none"></div>
      <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-golden/5 rounded-full blur-[100px] pointer-events-none"></div>

      <div class="relative z-10 flex flex-col items-center animate-welcome max-w-sm">
        <!-- الشعار المطور -->
        <div class="w-32 h-32 rounded-full border-[1.5px] border-golden/30 bg-black-gold/50 backdrop-blur-xl flex flex-col items-center justify-center shadow-[0_0_50px_rgba(212,175,55,0.1)] mb-10 overflow-hidden relative group">
          <div class="absolute inset-0 bg-gradient-to-br from-golden/20 to-transparent opacity-40"></div>
          <h1 class="text-golden font-black text-3xl leading-none relative z-10 tracking-tight">Golden</h1>
          <p class="text-white/60 text-[9px] uppercase tracking-[0.3em] mt-2 relative z-10 font-bold">Cafe</p>
        </div>

        <h2 class="text-white text-3xl font-extrabold mb-4 tracking-tight leading-tight" data-ar="أهلاً بك في كافيه قولدن" data-en="Experience Golden">أهلاً بك في كافيه قولدن</h2>
        <p class="text-white/60 text-[15px] mb-12 leading-relaxed font-medium" data-ar="نحن هنا لنسعدك بأفضل المذاقات وأرقى الخدمات. استمتع بتجربة فريدة في كل رشفة." data-en="Indulge in a world of exquisite flavors and premium coffee. Every sip is a story.">نحن هنا لنسعدك بأفضل المذاقات وأرقى الخدمات. استمتع بتجربة فريدة في كل رشفة.</p>

        <button id="explore-btn" class="group relative px-8 py-3 rounded-full overflow-hidden transition-all duration-500 hover:scale-105 active:scale-95 border border-golden/50 bg-black-gold/40 backdrop-blur-md">
          <!-- تأثير لمعان خفيف عند التحويم -->
          <div class="absolute inset-0 bg-golden opacity-0 group-hover:opacity-10 transition-opacity duration-500"></div>
          
          <div class="relative z-10 flex items-center gap-2 text-golden font-bold text-sm tracking-wide">
            <span data-ar="استكشف المنيو" data-en="Explore Menu">استكشف المنيو</span>
            <i data-lucide="chevron-left" class="w-4 h-4 transition-transform group-hover:-translate-x-1 rtl:group-hover:translate-x-1"></i>
          </div>
        </button>
      </div>
    </div>

    <!-- عناصر التحكم في رأس الصفحة (Header) -->
    <header class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center p-4 pointer-events-none">
      <!-- زر الانستقرام -->
      <div class="flex items-center gap-3 pointer-events-auto">
        <button class="w-10 h-10 bg-black/20 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center text-white shadow-lg">
          <i data-lucide="instagram" class="w-5 h-5"></i>
        </button>
      </div>
      <!-- أزرار تبديل اللغة والبحث -->
      <div class="flex items-center gap-3 pointer-events-auto">
        <button id="lang-toggle" class="w-10 h-10 bg-black/20 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center text-white shadow-lg transition-all hover:bg-golden active:scale-95">
          <i data-lucide="languages" class="w-5 h-5"></i>
        </button>
        <button id="search-btn" class="w-10 h-10 bg-black/20 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center text-white shadow-lg transition-all hover:bg-golden active:scale-95">
          <i data-lucide="search" class="w-5 h-5"></i>
        </button>
      </div>
    </header>

    <!-- قسم الواجهة الرئيسية (Hero Section) -->
    <section class="relative h-[45vh] w-full flex flex-col items-center justify-center overflow-hidden">
      <!-- خلفية الصورة مع تأثير التعتيم -->
      <div class="absolute inset-0 z-0">
        <img id="hero-bg" src="" alt="Cafe Background" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-[1px]"></div>
      </div>
      
      <!-- محتوى الشعار واسم الكافيه -->
      <div class="relative z-10 flex flex-col items-center text-center px-4 pt-8">
        <!-- الشعار الدائري -->
        <div class="w-32 h-32 rounded-full border-4 border-golden bg-black-gold flex flex-col items-center justify-center shadow-2xl mb-6 transform hover:scale-105 transition-transform">
          <h1 class="text-golden font-black text-3xl leading-none">Golden</h1>
          <p class="text-white/80 text-[10px] uppercase tracking-widest mt-1">Cafe & Restaurant</p>
        </div>
        
        <h2 class="text-white text-4xl font-extrabold mb-2 drop-shadow-lg" data-ar="كافيه قولدن" data-en="Golden Cafe">كافيه قولدن</h2>
        <div class="w-24 h-1 bg-golden mb-3"></div>
        <p class="text-white/90 text-lg font-medium drop-shadow-md" data-ar="الرفاهية في كل تفصيل" data-en="Luxury in every detail">الرفاهية في كل تفصيل</p>
      </div>
    </section>

    <!-- قسم تصنيفات الطعام والمشروبات (Categories) -->
    <section class="relative -mt-8 z-20 px-4">
      <div class="flex gap-4 overflow-x-auto no-scrollbar py-4 px-1">
        <!-- تصنيف الكل -->
        <button data-category="all" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-golden rounded-2xl flex flex-col items-center justify-center shadow-lg md:shadow-xl transition-all hover:scale-105 active:scale-95 group text-white">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="layout-grid" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold" data-ar="الكل" data-en="All">الكل</span>
          <div class="indicator w-6 h-1 bg-white rounded-full mt-1"></div>
        </button>

        <!-- عصير فريش -->
        <button data-category="juices" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="citrus" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold" data-ar="عصائر فريش" data-en="Fresh Juices">عصائر فريش</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- ميلك شيك -->
        <button data-category="shakes" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="cup-soda" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold" data-ar="ميلك شيك" data-en="Milk Shakes">ميلك شيك</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- موهيتو -->
        <button data-category="mojito" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="glass-water" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold" data-ar="موهيتو" data-en="Mojito">موهيتو</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- مشروبات ساخنة -->
        <button data-category="coffee" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="coffee" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold whitespace-nowrap" data-ar="مشروبات ساخنة" data-en="Hot Drinks">مشروبات ساخنة</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- قهوة مثلجة -->
        <button data-category="iced-coffee" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="snowflake" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold whitespace-nowrap" data-ar="قهوة مثلجة" data-en="Iced Coffee">قهوة مثلجة</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- مشروبات غازية -->
        <button data-category="soft-drinks" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="archive" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold" data-ar="غازيه" data-en="Soft Drinks">غازيه</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- بيتزا -->
        <button data-category="food" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="pizza" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold whitespace-nowrap" data-ar="بيتزا" data-en="Pizza">بيتزا</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- فرايز -->
        <button data-category="fries" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="utensils" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold whitespace-nowrap" data-ar="فرايز" data-en="Fries">فرايز</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- إضافات -->
        <button data-category="extras" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="plus-circle" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold whitespace-nowrap" data-ar="إضافات" data-en="Extras">إضافات</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- كلزوني -->
        <button data-category="calzone" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="pocket" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold" data-ar="كلزوني" data-en="Calzone">كلزوني</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- آيسكريم -->
        <button data-category="ice-cream" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="ice-cream" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold whitespace-nowrap" data-ar="آيسكريم" data-en="Ice Cream">آيسكريم</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- حلويات -->
        <button data-category="desserts" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="cake" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold" data-ar="حلويات" data-en="Desserts">حلويات</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>

        <!-- شيشة -->
        <button data-category="shisha" class="category-btn flex-shrink-0 min-w-[72px] h-[90px] md:min-w-[90px] md:h-[110px] bg-white rounded-2xl flex flex-col items-center justify-center shadow-md md:shadow-lg transition-all hover:scale-105 active:scale-95 group text-gray-500">
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center mb-1">
            <i data-lucide="wind" class="w-5 h-5 md:w-8 md:h-8"></i>
          </div>
          <span class="text-[10px] md:text-sm font-bold" data-ar="شيشة" data-en="Shisha">شيشة</span>
          <div class="indicator w-6 h-1 bg-golden rounded-full mt-1 hidden"></div>
        </button>
      </div>
    </section>

    <!-- النافذة المنبثقة للبحث (Search Overlay) -->
    <div id="search-overlay" class="fixed inset-0 z-[110] bg-black-gold/95 backdrop-blur-md flex flex-col items-center justify-start pt-24 px-6 opacity-0 pointer-events-none transition-all duration-300">
      <button id="close-search" class="absolute top-6 right-6 w-12 h-12 bg-white/10 rounded-full flex items-center justify-center text-white hover:bg-white/20 transition-colors">
        <i data-lucide="x" class="w-8 h-8"></i>
      </button>
      
      <div class="w-full max-w-xl">
        <h2 class="text-white text-3xl font-bold mb-8 text-center" data-en="Search the Menu" data-ar="ابحث في المنيو">ابحث في المنيو</h2>
        <div class="relative group">
          <input type="text" id="search-input" placeholder="مثلاً: بيتزا، عصير، آيس كريم..." class="w-full bg-white/10 border-2 border-white/20 rounded-2xl py-6 px-14 text-white text-xl focus:border-golden outline-none transition-all placeholder:text-white/30 text-center">
          <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-6 h-6 text-white/50 group-focus-within:text-golden"></i>
        </div>
      </div>
    </div>

    <!-- شبكة عرض المنتجات (Menu Grid) -->
    <main class="p-4 pb-12">
      <div id="menu-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        <!-- يتم حقن البطاقات بواسطة JavaScript -->
      </div>
    </main>

    <!-- نافذة تفاصيل المنتج (Product Details Modal) -->
    <div id="product-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
      <div class="absolute inset-0 bg-black/60 backdrop-blur-sm modal-close-trigger cursor-pointer"></div>
      
      <div class="relative w-full max-w-lg bg-[#FDFCF0] rounded-[40px] overflow-hidden shadow-2xl transform scale-90 transition-transform duration-300 border-4 border-golden/10">
        <!-- زر الإغلاق العلوي -->
        <button class="absolute top-6 right-6 z-10 w-10 h-10 bg-black/40 text-white rounded-full flex items-center justify-center backdrop-blur-md hover:bg-black/60 transition-colors modal-close-trigger">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>

        <!-- صورة المنتج -->
        <div class="h-64 sm:h-80 w-full relative">
          <img id="modal-image" src="" alt="" class="w-full h-full object-cover">
        </div>

        <!-- محتوى تفاصيل المنتج -->
        <div class="p-8 text-center">
          <h2 id="modal-title" class="text-black-gold text-3xl font-extrabold mb-3 line-clamp-1"></h2>
          <p id="modal-description" class="text-gray-600 text-lg mb-8 leading-relaxed px-4"></p>

          <!-- حاوية الأسعار والأحجام -->
          <div id="modal-prices-container" class="bg-golden/5 rounded-[32px] p-4 sm:p-6 space-y-3 mb-8 max-h-[300px] overflow-y-auto no-scrollbar">
            <!-- يتم حقن الأسعار هنا -->
          </div>

          <!-- زر الإغلاق السفلي -->
          <button class="w-full bg-golden text-white py-5 rounded-[24px] text-xl font-bold hover:bg-golden-dark transition-colors shadow-lg shadow-golden/20 modal-close-trigger mb-2" data-ar="إغلاق" data-en="Close">
            إغلاق
          </button>
        </div>
      </div>
    </div>

    <!-- تذييل الصفحة (Footer) -->
    <footer class="pb-12 pt-12 text-center bg-black-gold text-white mt-12 relative overflow-hidden">
      <!-- خط التدرج العلوي -->
      <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-transparent via-golden to-transparent"></div>
      <div class="relative z-10">
        <div class="mb-4">
          <h2 class="text-golden font-black text-xl">Golden Cafe</h2>
          <p class="text-white/40 text-[10px] uppercase tracking-widest" data-ar="الرفاهية في كل تفصيل" data-en="Luxurious Taste">الرفاهية في كل تفصيل</p>
        </div>
        <p class="text-gray-400 text-xs mb-2" data-ar="© 2024 جميع الحقوق محفوظة" data-en="© 2024 All Rights Reserved">
          &copy; 2024 جميع الحقوق محفوظة
        </p>
        <p class="text-gray-500 text-[10px]">
          <span data-ar="تم التطوير بواسطة" data-en="Developed by">تم التطوير بواسطة</span> 
          <a href="https://menutop.vercel.app" target="_blank" class="text-golden font-bold hover:underline" data-ar="منيو توب" data-en="Menu Top">منيو توب</a>
        </p>
      </div>
    </footer>

    <!-- Initialize Lucide Icons -->
    <script>
      lucide.createIcons();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
